version: 2

models:

# -----------------------------
# STAGING MODELS
# -----------------------------

  - name: stg_customers
    description: "Staging table for customer data coming from the raw customers table"

    columns:

      - name: customer_id
        description: "Primary key of the customer"
        tests:
          - not_null
          - unique

      - name: customer_name
        description: "Name of the customer"
        tests:
          - not_null

      - name: email
        description: "Customer email address"

      - name: country
        description: "Country where the customer resides"

      - name: signup_date
        description: "Date when the customer registered"


# -----------------------------
# PRODUCTS STAGING
# -----------------------------

  - name: stg_products
    description: "Staging table for product catalog"

    columns:

      - name: product_id
        description: "Primary key for products"
        tests:
          - not_null
          - unique

      - name: product_name
        description: "Name of the product"
        tests:
          - not_null

      - name: category
        description: "Product category"

      - name: price
        description: "Unit price of the product"
        tests:
          - not_null


# -----------------------------
# ORDERS STAGING
# -----------------------------

  - name: stg_orders
    description: "Staging table for order transactions"

    columns:

      - name: order_id
        description: "Primary key for orders"
        tests:
          - not_null
          - unique

      - name: customer_id
        description: "Foreign key referencing customer"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id

      - name: order_date
        description: "Date when order was placed"

      - name: order_status
        description: "Status of the order"
        tests:
          - accepted_values:
              arguments:
                values:
                  - Delivered
                  - Shipped
                  - Processing
                  - Cancelled


# -----------------------------
# ORDER ITEMS STAGING
# -----------------------------

  - name: stg_order_items
    description: "Staging table containing order item details"

    columns:

      - name: order_item_id
        description: "Primary key for order item"
        tests:
          - not_null
          - unique

      - name: order_id
        description: "Foreign key referencing orders"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id

      - name: product_id
        description: "Foreign key referencing products"
        tests:
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id

      - name: quantity
        description: "Quantity of the product ordered"
        tests:
          - not_null

      - name: price
        description: "Unit price of the product"


# -----------------------------
# PAYMENTS STAGING
# -----------------------------

  - name: stg_payments
    description: "Staging table for payment information"

    columns:

      - name: payment_id
        description: "Primary key of payment"
        tests:
          - not_null
          - unique

      - name: order_id
        description: "Order associated with payment"
        tests:
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id

      - name: payment_method
        description: "Method used for payment"

      - name: amount
        description: "Payment amount"

      - name: payment_status
        description: "Status of the payment"
        tests:
          - accepted_values:
              arguments:
                values:
                  - Paid
                  - Pending
                  - Refunded


# -----------------------------
# FACT TABLE
# -----------------------------

  - name: fct_sales
    description: "{{doc('fct_sales_doc')}}"

    columns:

      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - not_null
          - unique

      - name: customer_id
        description: "Customer who placed the order"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id

      - name: order_value
        description: "Total revenue generated from the order"
        tests:
          - not_null